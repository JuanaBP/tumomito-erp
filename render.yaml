# render.yaml - Blueprint de Render
# Crea web service + base de datos PostgreSQL automaticamente
# Ver: https://render.com/docs/blueprint-spec

databases:
  - name: tumomito-db
    plan: free
    databaseName: tumomito
    user: tumomito

services:
  - type: web
    name: tumomito-erp
    runtime: python
    plan: free
    region: oregon  # mas cercano a Latam, alternativa: ohio
    buildCommand: "bash build.sh"
    startCommand: "gunicorn tumomito.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true  # Render genera una clave segura
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: tumomito-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "admin123"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@tumomito.bo"
