{% extends 'layouts/base.html' %}
{% block page_title %}Eliminar Cliente{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
        <h4 class="mt-3">Confirmar eliminacion</h4>
        <p class="text-muted">Vas a eliminar permanentemente al cliente <strong>{{ cliente.persona.nombre }}</strong> ({{ cliente.nit }}).</p>
        <p class="text-danger small">Esta accion no se puede deshacer.</p>
        <form method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Si, eliminar</button>
            <a href="{% url 'clientes:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
