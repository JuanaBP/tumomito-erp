{% if page.has_other_pages %}
<nav aria-label="Paginacion">
    <ul class="pagination pagination-sm mb-0 justify-content-center">
        {% if page.has_previous %}
            <li class="page-item"><a class="page-link" href="?page=1&q={{ request.GET.q }}">&laquo;</a></li>
            <li class="page-item"><a class="page-link" href="?page={{ page.previous_page_number }}&q={{ request.GET.q }}">Anterior</a></li>
        {% endif %}
        <li class="page-item active"><span class="page-link">{{ page.number }} / {{ page.paginator.num_pages }}</span></li>
        {% if page.has_next %}
            <li class="page-item"><a class="page-link" href="?page={{ page.next_page_number }}&q={{ request.GET.q }}">Siguiente</a></li>
            <li class="page-item"><a class="page-link" href="?page={{ page.paginator.num_pages }}&q={{ request.GET.q }}">&raquo;</a></li>
        {% endif %}
    </ul>
</nav>
{% endif %}
