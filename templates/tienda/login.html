{% extends 'tienda/base_tienda.html' %}
{% block title %}Ingresar - {{ EMPRESA_NOMBRE }}{% endblock %}

{% block content %}
<div class="auth-box">
    <h3 class="text-center mb-4"><i class="bi bi-person-circle"></i> Ingresar a tu cuenta</h3>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Contrasena</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">Ingresar</button>
        <p class="text-center mt-3 small">No tenes cuenta? <a href="{% url 'tienda:registro' %}">Registrate gratis</a></p>
    </form>
</div>
{% endblock %}
