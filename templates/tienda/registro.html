{% extends 'tienda/base_tienda.html' %}
{% block title %}Registro - {{ EMPRESA_NOMBRE }}{% endblock %}

{% block content %}
<div class="auth-box" style="max-width:600px;">
    <h3 class="text-center mb-4"><i class="bi bi-person-plus"></i> Crear cuenta nueva</h3>
    <form method="post">
        {% csrf_token %}
        <h6 class="text-muted text-uppercase small">Tus datos</h6>
        <div class="row g-3">
            <div class="col-md-8"><label class="form-label">Nombre completo *</label><input name="nombre" class="form-control" required></div>
            <div class="col-md-4"><label class="form-label">CI *</label><input name="ci" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">NIT *</label><input name="nit" class="form-control" required placeholder="Si no tenes, repeti tu CI"></div>
            <div class="col-md-6"><label class="form-label">Celular *</label><input name="celular" class="form-control" required placeholder="70123456"></div>
            <div class="col-12"><label class="form-label">Email</label><input name="email" type="email" class="form-control"></div>
        </div>

        <h6 class="text-muted text-uppercase small mt-4">Datos de acceso</h6>
        <div class="row g-3">
            <div class="col-md-12"><label class="form-label">Usuario *</label><input name="username" class="form-control" required></div>
            <div class="col-md-6"><label class="form-label">Contrasena *</label><input type="password" name="password" class="form-control" required minlength="6"></div>
            <div class="col-md-6"><label class="form-label">Repetir contrasena *</label><input type="password" name="password2" class="form-control" required></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">Crear mi cuenta</button>
        <p class="text-center mt-3 small">Ya tenes cuenta? <a href="{% url 'tienda:login' %}">Ingresa aqui</a></p>
    </form>
</div>
{% endblock %}
