{% extends 'layouts/base.html' %}
{% block page_title %}Eliminar Rol{% endblock %}

{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card border-danger">
        <div class="card-body text-center">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
            <h4 class="mt-3">Eliminar rol "{{ rol.nombre }}"?</h4>
            <p class="text-muted">Esta accion no se puede deshacer.</p>
            <form method="post" class="mt-3">
                {% csrf_token %}
                <a href="{% url 'personal:roles' %}" class="btn btn-secondary">Cancelar</a>
                <button class="btn btn-danger"><i class="bi bi-trash"></i> Si, eliminar</button>
            </form>
        </div>
    </div>
</div></div>
{% endblock %}
