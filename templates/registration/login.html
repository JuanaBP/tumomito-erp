{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesion - {{ EMPRESA_NOMBRE }} ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/erp.css' %}">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <i class="bi bi-shop-window"></i>
            <h1>{{ EMPRESA_NOMBRE }} <span class="text-primary">ERP</span></h1>
            <p class="text-muted small">{{ EMPRESA_SLOGAN }}</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger">
                Usuario o contrasena incorrectos.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Contrasena</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
            </div>
            <button class="btn btn-primary btn-lg w-100" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesion
            </button>
        </form>
        <p class="text-center text-muted small mt-4 mb-0">
            &copy; {{ EMPRESA_ANIO }} {{ EMPRESA_NOMBRE }}
        </p>
    </div>
</body>
</html>
